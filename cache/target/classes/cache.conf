default{
    l1{
        provider="mi.hoprxi.l1.concurrentMap.ConcurrentMapCache"
        expiryPolicy="LRU"
        maxAmount = "-1"
        maximumSize = "-1l"
        expired = "-1"
    }
}
redis{
    host:"127.0.0.1"
    port:"6379"
    serialization:"FSTSerialization"
    maxTotal:"8"
    maxIdle:"8"
    minIdle:"1"
    maxWaitMillis:"1000"
    testOnBorrow:"true"
    testOnReturn:"true"
    testWhileIdle:"true"
    timeout:"2000"
}
Lettuce{
 host:"127.0.0.1"
    port:"6379"
    serialization:"FSTSerialization"
    timeout:"2000"
}